<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Zella Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0f1115; --card: #1c1f26; --text: #d1d4dc; --accent: #2962ff; --green: #089981; --red: #f23645; --border: #2b3139; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; font-size: 13px; }
        h3 { color: white; margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; }
        .live-badge { background: var(--green); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .metric-label { font-size: 11px; color: #8a919e; text-transform: uppercase; }
        .metric-value { font-size: 16px; font-weight: bold; color: white; margin-top: 4px; }
        .profit { color: var(--green); } .loss { color: var(--red); }

        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        input, select, button { background: #0f1115; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 12px; }
        
        #tv-chart-container { width: 100%; height: 320px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button { font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .buy-btn { background: var(--green); border: none; }
        .sell-btn { background: var(--red); border: none; }
        .play-btn { background: var(--accent); border: none; }

        .trade-log { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); font-size: 11px; }
        .trade-log th, .trade-log td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        .trade-log th { background: #232833; color: #8a919e; }
    </style>
</head>
<body>

    <h3>Zella-Lite <span class="live-badge">Live API Connected</span></h3>

    <div class="dashboard">
        <div class="metric-card"><div class="metric-label">Total Equity</div><div class="metric-value" id="ui-equity">$10,000.00</div></div>
        <div class="metric-card"><div class="metric-label">Win Rate</div><div class="metric-value" id="ui-winrate">0.0%</div></div>
        <div class="metric-card"><div class="metric-label">Profit Factor</div><div class="metric-value" id="ui-profit-factor">0.00</div></div>
        <div class="metric-card"><div class="metric-label">Live Trade PnL</div><div class="metric-value" id="ui-live-pnl">Flat</div></div>
    </div>

    <div class="toolbar">
        <select id="asset-select">
            <option value="BTCUSDT">Bitcoin (BTC/USDT)</option>
            <option value="ETHUSDT">Ethereum (ETH/USDT)</option>
            <option value="SOLUSDT">Solana (SOL/USDT)</option>
        </select>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label style="color:#8a919e; font-size:11px;">Risk%</label>
            <input type="number" id="risk-input" value="10" min="1" max="100" style="width: 50px;">
        </div>
        <button id="btn-load" style="background: var(--accent); border: none; flex-grow: 1;">Download Real Data</button>
    </div>
    
    <div id="tv-chart-container"></div>

    <div class="controls">
        <button class="buy-btn" id="btn-buy">Long Position</button>
        <button class="sell-btn" id="btn-sell">Close Trade</button>
        <button class="play-btn" id="btn-play">Next / Play ▶️</button>
    </div>

    <table class="trade-log">
        <thead><tr><th>#</th><th>Asset</th><th>Entry</th><th>Exit</th><th>PnL</th></tr></thead>
        <tbody id="log-body"></tbody>
    </table>

    <script>
        const chartContainerElement = document.getElementById('tv-chart-container');
        const tvChart = LightweightCharts.createChart(chartContainerElement, {
            layout: { background: { color: '#0f1115' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
            timeScale: { timeVisible: true }
        });
        const candleSeries = tvChart.addCandlestickSeries({ upColor: '#089981', downColor: '#f23645', borderVisible: false });

        let balance = 10000; let positionSize = 0; let entryPrice = 0; let currentPrice = 0;
        let tradeHistory = []; let grossProfit = 0; let grossLoss = 0;
        let fullData = []; let currentIndex = 0; let playInterval = null;

        // Fetch Real Data from Binance API
        async function fetchRealData(symbol) {
            const btn = document.getElementById('btn-load');
            btn.innerText = "Downloading...";
            btn.style.background = "#f5a623";
            
            try {
                // Gets the last 1000 days of data for the chosen asset
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1d&limit=1000`);
                const data = await response.json();
                
                // Format data for Lightweight Charts
                const formattedData = data.map(d => ({
                    time: d[0] / 1000, 
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));
                
                btn.innerText = "Download Real Data";
                btn.style.background = "var(--accent)";
                return formattedData;
            } catch (error) {
                alert("Error connecting to internet market data.");
                btn.innerText = "Download Real Data";
                btn.style.background = "var(--accent)";
                return [];
            }
        }

        async function loadChart() {
            const asset = document.getElementById('asset-select').value;
            fullData = await fetchRealData(asset);
            
            if (fullData.length > 0) {
                currentIndex = 100; // Start by showing the first 100 days
                candleSeries.setData(fullData.slice(0, currentIndex));
                currentPrice = fullData[currentIndex - 1].close;
                
                balance = 10000; positionSize = 0; tradeHistory = []; grossProfit = 0; grossLoss = 0;
                document.getElementById('log-body').innerHTML = '';
                updateDashboard();
            }
        }

        function updateDashboard() {
            let floatingPnL = positionSize > 0 ? (currentPrice - entryPrice) * positionSize : 0;
            let equity = balance + floatingPnL;
            document.getElementById('ui-equity').innerText = "$" + equity.toFixed(2);
            
            const pnlEl = document.getElementById('ui-live-pnl');
            if (positionSize > 0) {
                pnlEl.innerText = (floatingPnL >= 0 ? "+$" : "-$") + Math.abs(floatingPnL).toFixed(2);
                pnlEl.className = floatingPnL >= 0 ? "metric-value profit" : "metric-value loss";
            } else {
                pnlEl.innerText = "Flat"; pnlEl.className = "metric-value";
            }

            if (tradeHistory.length > 0) {
                let wins = tradeHistory.filter(t => t.pnl > 0).length;
                let winRate = (wins / tradeHistory.length) * 100;
                let profitFactor = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : grossProfit > 0 ? "Infinite" : "0.00";
                
                document.getElementById('ui-winrate').innerText = winRate.toFixed(1) + "%";
                document.getElementById('ui-profit-factor').innerText = profitFactor;
            }
        }

        function nextCandle() {
            if (currentIndex < fullData.length - 1) {
                let newCandle = fullData[currentIndex];
                candleSeries.update(newCandle);
                currentPrice = newCandle.close;
                currentIndex++;
                updateDashboard();
            } else {
                togglePlay(true);
            }
        }

        function togglePlay(forceStop = false) {
            if (playInterval || forceStop) {
                clearInterval(playInterval); playInterval = null;
            } else {
                playInterval = setInterval(nextCandle, 400);
            }
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            if(!playInterval) nextCandle();
            togglePlay(); 
        });
        
        document.getElementById('btn-load').addEventListener('click', loadChart);

        document.getElementById('btn-buy').addEventListener('click', () => {
            if (positionSize === 0) {
                let riskPct = document.getElementById('risk-input').value / 100;
                let capitalToRisk = balance * riskPct;
                entryPrice = currentPrice;
                positionSize = capitalToRisk / currentPrice; 
                updateDashboard();
            }
        });

        document.getElementById('btn-sell').addEventListener('click', () => {
            if (positionSize > 0) {
                let pnl = (currentPrice - entryPrice) * positionSize;
                balance += pnl;
                
                if (pnl > 0) grossProfit += pnl;
                else grossLoss += Math.abs(pnl);

                const asset = document.getElementById('asset-select').options[document.getElementById('asset-select').selectedIndex].text;
                tradeHistory.push({ asset, entry: entryPrice, exit: currentPrice, pnl });
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${tradeHistory.length}</td><td>${asset.split(' ')[0]}</td><td>$${entryPrice.toFixed(2)}</td><td>$${currentPrice.toFixed(2)}</td><td class="${pnl >= 0 ? 'profit' : 'loss'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</td>`;
                document.getElementById('log-body').prepend(tr);

                positionSize = 0;
                updateDashboard();
            }
        });
    </script>
</body>
</html>
